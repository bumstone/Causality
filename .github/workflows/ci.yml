name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile sources and tests
        run: python -m compileall -q src tests
      - name: Validate shell helpers
        run: |
          bash -n scripts/*.sh
          test -x scripts/install.sh
          test -x scripts/doctor.sh
          test -x scripts/update.sh
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Editable install smoke test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          causality manifest >/dev/null

  windows-orchestration:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Compile orchestration sources and tests
        run: python -m compileall -q src tests
      - name: Run Windows controller and external crash stress
        run: >-
          python -m unittest -v
          tests.test_automatic_orchestration_contract
          tests.test_orchestration_checkpoint
          tests.test_orchestration_driver
          tests.test_orchestration_hitl
          tests.test_orchestration_external
