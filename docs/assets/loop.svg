<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe"/>
    </marker>
    <marker id="arg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb950"/>
    </marker>
  </defs>
  <style>
    .panel{fill:#171a21;stroke:#2a3140;stroke-width:1}
    .tc{fill:#ffffff;font-size:15px;font-weight:700;text-anchor:middle}
    .sc{fill:#9aa4b2;font-size:11.5px;text-anchor:middle}
    .ok{fill:#3fb950;font-size:11px;font-weight:700;text-anchor:middle}
    .cap{fill:#9aa4b2;font-size:12px;text-anchor:middle}
    .edge{stroke:#6ea8fe;stroke-width:1.8;fill:none}
    .dash{stroke:#3fb950;stroke-width:1.6;fill:none;stroke-dasharray:6 5}
  </style>
  <rect width="880" height="330" rx="14" fill="#0f1115"/>

  <!-- top cycle: Run -> Review -> Fix -> Run -->
  <rect class="panel" x="60" y="44" width="190" height="62" rx="12"/>
  <text class="tc" x="155" y="70">Run</text>
  <text class="sc" x="155" y="87">증거·verifier 원장 기록</text>
  <text class="ok" x="155" y="100">✓ 구현 implemented</text>

  <line class="edge" x1="250" y1="75" x2="343" y2="75" marker-end="url(#ar)"/>

  <rect class="panel" x="345" y="44" width="190" height="62" rx="12"/>
  <text class="tc" x="440" y="70">Review</text>
  <text class="sc" x="440" y="87">run_review · 독립 verifier ≥2 pass</text>
  <text class="ok" x="440" y="100">✓ 구현 implemented</text>

  <line class="edge" x1="535" y1="75" x2="628" y2="75" marker-end="url(#ar)"/>

  <rect class="panel" x="630" y="44" width="190" height="62" rx="12"/>
  <text class="tc" x="725" y="70">Fix</text>
  <text class="sc" x="725" y="87">REPAIR 소비 · bounded loop</text>
  <text class="ok" x="725" y="100">✓ 구현 implemented</text>

  <!-- Fix back to Run -->
  <path class="edge" d="M725,106 V146 H155 V112" marker-end="url(#ar)"/>

  <!-- bottom cycle: Run -.-> Reflect -.-> Skill -.-> Run -->
  <path class="dash" d="M155,146 V196" marker-end="url(#arg)"/>
  <rect class="panel" x="60" y="198" width="240" height="62" rx="12" stroke="#1f6f33"/>
  <text class="tc" x="180" y="224">Reflect</text>
  <text class="sc" x="180" y="241">reflect_on_contract · 회고+실패 증류</text>
  <text class="ok" x="180" y="254">✓ 구현 implemented</text>

  <line class="dash" x1="300" y1="229" x2="438" y2="229" marker-end="url(#arg)"/>

  <rect class="panel" x="440" y="198" width="240" height="62" rx="12" stroke="#1f6f33"/>
  <text class="tc" x="560" y="224">Skill update</text>
  <text class="sc" x="560" y="241">SkillStore · n-of-m 재현성 + HITL 승급</text>
  <text class="ok" x="560" y="254">✓ 구현 implemented</text>

  <path class="dash" d="M560,260 V284 H30 V75 H56" marker-end="url(#arg)"/>

  <text class="cap" x="455" y="304">실선: Run → Review → Fix · 점선: Reflect → Skill update — 다섯 단계 모두 CausalityEngine(run_task / run_next)으로 연결됨</text>
</svg>
