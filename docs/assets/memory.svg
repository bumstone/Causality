<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe"/>
    </marker>
  </defs>
  <style>
    .panel{fill:#171a21;stroke-width:1.2}
    .tc{fill:#ffffff;font-size:14px;font-weight:700;text-anchor:middle}
    .sc{fill:#9aa4b2;font-size:11.5px;text-anchor:middle}
    .cap{fill:#9aa4b2;font-size:12px;text-anchor:middle}
    .chipt{fill:#cdd5e1;font-size:12px;text-anchor:middle}
    .edge{stroke:#6ea8fe;stroke-width:1.8;fill:none}
  </style>
  <rect width="880" height="270" rx="14" fill="#0f1115"/>

  <!-- assumptions -->
  <rect class="panel" x="60" y="36" width="230" height="70" rx="12" stroke="#7a5a13"/>
  <text class="tc" x="175" y="64">assumptions · 임시 가정</text>
  <text class="sc" x="175" y="84">잠정 · TTL 적용 · 계획 전제 금지</text>

  <line class="edge" x1="290" y1="71" x2="343" y2="71" marker-end="url(#ar)"/>

  <!-- promotion gate -->
  <rect class="panel" x="345" y="36" width="190" height="70" rx="12" stroke="#6ea8fe" stroke-dasharray="6 4"/>
  <text class="tc" x="440" y="60">승급 게이트</text>
  <text class="sc" x="440" y="78">promotion gate</text>
  <text class="sc" x="440" y="94">확정 증거(evidence) 필수</text>

  <line class="edge" x1="535" y1="71" x2="588" y2="71" marker-end="url(#ar)"/>

  <!-- decisions -->
  <rect class="panel" x="590" y="36" width="230" height="70" rx="12" stroke="#1f6f33"/>
  <text class="tc" x="705" y="64">decisions · 확정 결정</text>
  <text class="sc" x="705" y="84">provenance = ledger entry_hash</text>

  <!-- six stores -->
  <text class="cap" x="440" y="150">6개 타입 스토어 · six typed stores (memory/)</text>
  <rect class="panel" x="60" y="164" width="120" height="34" rx="10" stroke="#1f6f33"/>
  <text class="chipt" x="120" y="186">decisions</text>
  <rect class="panel" x="190" y="164" width="120" height="34" rx="10" stroke="#7a5a13"/>
  <text class="chipt" x="250" y="186">assumptions</text>
  <rect class="panel" x="320" y="164" width="120" height="34" rx="10" stroke="#7a2620"/>
  <text class="chipt" x="380" y="186">failures</text>
  <rect class="panel" x="450" y="164" width="120" height="34" rx="10" stroke="#2a3140"/>
  <text class="chipt" x="510" y="186">playbooks</text>
  <rect class="panel" x="580" y="164" width="120" height="34" rx="10" stroke="#2a3140"/>
  <text class="chipt" x="640" y="186">snippets</text>
  <rect class="panel" x="710" y="164" width="130" height="34" rx="10" stroke="#2a3140"/>
  <text class="chipt" x="775" y="186">retrospectives</text>

  <text class="cap" x="440" y="238">가정은 증거를 갖춘 승급 게이트를 통과해야만 결정이 된다 — 메모리 오염 방지 (ADR 0005 §2.5)</text>
</svg>
